workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - wannas-release
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
